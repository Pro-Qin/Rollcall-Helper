<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 高级抽奖系统</title>
    <link rel="stylesheet" href="lottery.css">
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<!-- 顶部版权栏 -->
<div class="copyright-bar">
    <span class="copy-left">🎰 抽奖系统</span>
    <span class="copy-center">© 2026 Qin_zzq. All Rights Reserved.</span>
</div>

<div class="app">
<div class="main-area">
    <div class="wheel-wrap" id="wheelWrap">
            <div class="pointer-top"></div>
            <canvas id="wheelCanvas"></canvas>
        </div>

        <div class="spin-cost">
            <button id="spinBtn" onclick="doSpin()">🎯 开始抽奖</button>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-header">
            <h2><span class="ph-emoji">🎰</span> 奖池</h2>
        </div>
        <div class="toolbar">
            <button class="tbtn active" onclick="switchTab(this,'items')">📋 项目</button>
            <button class="tbtn" onclick="openSlide('newItemPanel')">➕ 新增</button>
            <button class="tbtn" onclick="openSlide('settingsPanel')">⚙️ 配置</button>
            <button class="tbtn" onclick="openSlide('historyPanel')">📜 历史</button>
        </div>
        <div class="item-list" id="itemListEl">
            <div class="empty-hint"><div class="eh-icon">🎁</div><p>打开配置添加奖项</p></div>
        </div>
    </div>
</div>

<!-- 设置面板 -->
<div class="slide-panel" id="settingsPanel">
    <div class="sp-header">
        <div class="sp-title">⚙️ 奖项配置</div>
        <button class="sp-close" onclick="closeSlide('settingsPanel')">✕</button>
    </div>
    <div class="sp-body">
        <div class="section-label">已配置的奖项</div>
        <div id="settingsItemList"></div>

        <div class="section-label" style="margin-top:28px">配置管理</div>
        <div class="btn-row">
            <button class="act-btn pri" onclick="saveAsDefault()" style="background:linear-gradient(135deg,#f59e0b,#f97316)">💾 存为默认</button>
            <button class="act-btn pri" onclick="resetPool()">🔄 重置奖池</button>
        </div>

        <div class="section-label" style="margin-top:28px">配置导入/导出</div>
        <div class="btn-row">
            <button class="act-btn pri" onclick="exportConfig()" style="background:linear-gradient(135deg,#06b6d4,#3b82f6)">📤 导出配置</button>
            <button class="act-btn pos" onclick="$('importFile').click()" style="background:linear-gradient(135deg,#10b981,#059669)">📥 导入配置</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importConfig(event)">
        </div>
        <button class="act-btn" style="width:100%;margin-top:8px;background:linear-gradient(135deg,#8b5cf6,#6366f1)" onclick="loadDefaultItems()">🎁 加载默认奖项</button>
        <p style="font-size:12px;color:var(--text-muted);margin-top:8px">
            导出配置：保存所有奖项和设置到JSON文件。<br>
            导入配置：从JSON文件恢复奖项和设置。<br>
            默认奖项：一键加载预设奖项（积分翻倍/增长/交换/减少/奶茶一杯~等，按百分比分配）。
        </p>
    </div>
</div>

<!-- 新增奖项面板 -->
<div class="slide-panel" id="newItemPanel">
    <div class="sp-header">
        <div class="sp-title">➕ 新增奖项</div>
        <button class="sp-close" onclick="closeSlide('newItemPanel')">✕</button>
    </div>
    <div class="sp-body">
        <div class="field-group"><label class="fg-label">奖项名称</label><input class="input-field" id="inpName" placeholder="例如：奶茶大奖" /></div>

        <div class="edit-row">
            <div class="field-group"><label class="fg-label">类型</label>
                <select class="input-field" id="inpType">
                    <option value="positive">✅ 褒义奖励</option>
                    <option value="neutral">🔘 中性</option>
                    <option value="negative">❌ 贬义惩罚</option>
                    <option value="special">⭐ 特殊/实物</option>
                </select>
            </div>
            <div class="field-group"><label class="fg-label">占比（%）</label><input type="number" class="input-field" id="inpPct" value="5" min="1" max="100" /></div>
        </div>

        <div class="field-group">
            <label class="fg-label">图片（抽中时显示）</label>
            <div class="upload-zone" onclick="$('emojiFile').click()">
                <input type="file" id="emojiFile" accept="image/*" onchange="onEmojiUpload(event)">
                📁 点击上传图片
            </div>
            <img class="upload-preview" id="emojiPrev" style="display:none" />
        </div>

        <div class="field-group">
            <label class="fg-label">抽中音效</label>
            <select class="input-field" id="inpSound">
                <option value="none">🔇 无</option>
                <option value="meow">🐱 猫叫声</option>
                <option value="tada">🎉 胜利音效</option>
                <option value="sad">😿 悲伤音效</option>
                <option value="drum">🥁 鼓声</option>
            </select>
        </div>

        <div class="btn-row" style="grid-template-columns:1fr 1fr 1fr;gap:8px">
            <button class="act-btn pos" onclick="addItem('positive')">+ 褒</button>
            <button class="act-btn" style="background:linear-gradient(135deg,#475569,#64748b)" onclick="addItem('neutral')">+ 中</button>
            <button class="act-btn neg" onclick="addItem('negative')">+ 贬</button>
        </div>
        <div style="margin-top:10px">
            <button class="act-btn pri" style="width:100%" onclick="addItem('special')">⭐ 添加特殊/实物类</button>
        </div>
    </div>
</div>

<!-- 编辑奖项面板 -->
<div class="slide-panel" id="editItemPanel">
    <div class="sp-header">
        <div class="sp-title">✏️ 编辑奖项</div>
        <button class="sp-close" onclick="closeSlide('editItemPanel')">✕</button>
    </div>
    <div class="sp-body">
        <input type="hidden" id="editItemId" />
        <div class="field-group"><label class="fg-label">奖项名称</label><input class="input-field" id="editName" placeholder="奖项名称" /></div>

        <div class="edit-row">
            <div class="field-group"><label class="fg-label">类型</label>
                <select class="input-field" id="editType">
                    <option value="positive">✅ 褒义奖励</option>
                    <option value="neutral">🔘 中性</option>
                    <option value="negative">❌ 贬义惩罚</option>
                    <option value="special">⭐ 特殊/实物</option>
                </select>
            </div>
            <div class="field-group"><label class="fg-label">占比（%）</label><input type="number" class="input-field" id="editPct" value="5" min="1" max="100" /></div>
        </div>

        <div class="field-group">
            <label class="fg-label">图片（抽中时显示）</label>
            <div class="edit-item-img">
                <img class="edit-preview" id="editImgPreview" src="" style="display:none" />
                <div>
                    <div class="upload-zone" onclick="$('editEmojiFile').click()" style="margin-bottom:0">
                        <input type="file" id="editEmojiFile" accept="image/*" onchange="onEditEmojiUpload(event)">
                        📁 更换图片
                    </div>
                    <span class="del-img" onclick="clearEditImg()" style="cursor:pointer;margin-top:6px;display:inline-block">🗑️ 删除图片</span>
                </div>
            </div>
        </div>

        <div class="field-group">
            <label class="fg-label">抽中音效</label>
            <select class="input-field" id="editSound">
                <option value="none">🔇 无</option>
                <option value="meow">🐱 猫叫声</option>
                <option value="tada">🎉 胜利音效</option>
                <option value="sad">😿 悲伤音效</option>
                <option value="drum">🥁 鼓声</option>
            </select>
        </div>

        <div class="btn-row" style="margin-top:20px">
            <button class="act-btn pri" style="grid-column:1/-1" onclick="saveEditItem()">💾 保存修改</button>
        </div>
        <button class="act-btn neg" style="width:100%;margin-top:10px" onclick="deleteCurrentItem()">🗑️ 删除此奖项</button>
    </div>
</div>

<!-- 历史面板 -->
<div class="slide-panel" id="historyPanel">
    <div class="sp-header">
        <div class="sp-title">📜 抽奖历史</div>
        <button class="sp-close" onclick="closeSlide('historyPanel')">✕</button>
    </div>
    <div class="sp-body" id="historyBody">
        <div class="empty-hint"><div class="eh-icon">📭</div><p>暂无记录</p></div>
        <button class="act-btn neg" style="width:100%;margin-top:16px" onclick="clearHist()">🗑️ 清空历史</button>
    </div>
</div>

<div class="backdrop" id="backdrop" onclick="closeAllSlides()"></div>

<!-- 左下角全屏按钮 -->
<button class="fs-btn" onclick="toggleFS()" title="全屏">⛶</button>

<!-- 结果弹窗 -->
<div class="overlay result-overlay" id="resultOverlay">
    <div class="result-card">
        <img class="res-img" id="resImg" src="" alt="" />
        <div class="res-text" id="resText"></div>
        <div class="res-sub" id="resSub"></div>
        <button class="res-close" onclick="closeResult()">继续抽奖 🎉</button>
    </div>
</div>

<!-- 积分老虎机弹窗 -->
<div class="overlay slot-overlay" id="slotOverlay">
    <div class="slot-layout">
        <div class="slot-info-card" id="slotInfoCard">
            <div class="slot-info-title">📋 规则说明</div>
            <div class="slot-info-body" id="slotInfoContent"></div>
        </div>
        <div class="slot-card">
            <div class="slot-title" id="slotTitle">🎰 积分老虎机 🎰</div>
            <div class="slot-subtitle" id="slotSubtitle">点击「停止」按钮结束滚动</div>
            <div class="slot-display">
                <div class="slot-window">
                    <div class="slot-digit" id="slot0">0</div>
                    <div class="slot-digit" id="slot1">0</div>
                    <div class="slot-digit" id="slot2">0</div>
                </div>
            </div>
            <div class="slot-result" id="slotResult"></div>
            <button class="res-close" id="slotStopBtn" onclick="stopSlotManual()">🛑 停止</button>
            <button class="res-close" id="slotCloseBtn" onclick="closeSlot()" style="display:none">确定</button>
        </div>
    </div>
</div>

<script src="lottery.js"></script>
</body>
</html>
